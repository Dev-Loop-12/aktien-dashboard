<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktien Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e17; --bg-2: #111827; --bg-3: #1a2234; --bg-4: #222f43;
      --surface: rgba(26,34,52,0.65); --glass: rgba(26,34,52,0.45);
      --text: #f1f5f9; --text-2: #94a3b8; --text-3: #64748b;
      --border: rgba(148,163,184,0.08); --border-2: rgba(148,163,184,0.15);
      --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
      --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.12);
      --purple: #8b5cf6; --purple-dim: rgba(139,92,246,0.12);
      --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.12);
      --radius: 16px; --radius-sm: 10px; --radius-xs: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.25); --shadow-lg: 0 16px 48px rgba(0,0,0,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body.no-scroll { overflow: hidden; }
    .bg-glow { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 600px 400px at 15% 10%, rgba(59,130,246,0.07), transparent), radial-gradient(ellipse 500px 500px at 85% 80%, rgba(139,92,246,0.06), transparent); }

    .header { position: sticky; top: 0; z-index: 100; background: rgba(10,14,23,0.82); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(135deg, var(--blue), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #fff; box-shadow: 0 0 20px rgba(59,130,246,0.3); }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .update-badge { font-size: 11px; color: var(--text-3); background: var(--bg-3); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
    .update-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .btn { padding: 8px 18px; border-radius: var(--radius-xs); border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .btn-primary { background: linear-gradient(135deg, var(--blue), var(--purple)); color: #fff; box-shadow: 0 2px 12px rgba(59,130,246,0.25); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59,130,246,0.35); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Currency Toggle */
    .currency-toggle { display: flex; background: var(--bg-3); border-radius: var(--radius-xs); overflow: hidden; border: 1px solid var(--border); }
    .cur-btn { padding: 6px 14px; background: none; border: none; color: var(--text-3); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
    .cur-btn.active { background: var(--blue-dim); color: var(--blue); }
    .cur-btn:hover:not(.active) { color: var(--text-2); }
    .rate-info { font-size: 10px; color: var(--text-3); margin-left: 2px; }

    .page { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 28px 32px 60px; }
    .summary-strip { display: flex; gap: 10px; margin-bottom: 28px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .summary-strip::-webkit-scrollbar { display: none; }
    .stat-chip { flex-shrink: 0; background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 20px; min-width: 170px; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s; }
    .stat-chip:hover { border-color: var(--border-2); }
    .stat-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .stat-info { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 11px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }

    .tab-bar { display: flex; gap: 6px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 0; overflow-x: auto; scrollbar-width: none; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; padding: 10px 20px; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-3); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
    .tab:hover { color: var(--text-2); }
    .tab.active { color: var(--text); border-bottom-color: var(--blue); font-weight: 600; }
    .tab .tab-icon { font-size: 15px; }
    .tab .tab-count { background: var(--bg-4); font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 10px; color: var(--text-2); }
    .tab.active .tab-count { background: var(--blue-dim); color: var(--blue); }

    .sort-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 12px; flex-wrap: wrap; }
    .sort-bar-left { font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 8px; }
    .sort-bar-right { display: flex; gap: 6px; align-items: center; }
    .sort-btn { padding: 5px 12px; border-radius: var(--radius-xs); background: var(--bg-3); color: var(--text-3); border: 1px solid var(--border); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .sort-btn:hover, .sort-btn.active { background: var(--blue-dim); color: var(--blue); border-color: rgba(59,130,246,0.2); }
    .view-toggle { display: flex; background: var(--bg-3); border-radius: var(--radius-xs); overflow: hidden; border: 1px solid var(--border); }
    .view-btn { padding: 5px 10px; background: none; border: none; color: var(--text-3); font-size: 14px; cursor: pointer; transition: all 0.15s; }
    .view-btn.active { background: var(--blue-dim); color: var(--blue); }

    .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; animation: fadeIn 0.35s ease; }
    .stock-grid.list-view { grid-template-columns: 1fr; }
    .stock-grid.list-view .stock-card { flex-direction: row; align-items: center; padding: 14px 20px; }
    .stock-grid.list-view .stock-card .card-sparkline { width: 100px; height: 32px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .stock-card { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; gap: 14px; position: relative; overflow: hidden; }
    .stock-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 60%, rgba(59,130,246,0.03)); opacity: 0; transition: opacity 0.3s; }
    .stock-card:hover { border-color: var(--border-2); transform: translateY(-3px); box-shadow: var(--shadow); }
    .stock-card:hover::before { opacity: 1; }
    .card-row-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-symbol-group { display: flex; align-items: center; gap: 12px; }
    .card-avatar { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .card-symbol { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .card-name { font-size: 12px; color: var(--text-3); margin-top: 1px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-price-group { text-align: right; }
    .card-price { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .card-change { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 4px; }
    .card-change.up { background: var(--green-dim); color: var(--green); }
    .card-change.down { background: var(--red-dim); color: var(--red); }
    .card-change svg { width: 12px; height: 12px; }
    .card-row-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
    .card-sparkline { width: 100%; height: 40px; flex: 1; }
    .card-meta { display: flex; gap: 16px; font-size: 11px; color: var(--text-3); flex-shrink: 0; padding-left: 14px; }
    .card-meta span { display: flex; flex-direction: column; gap: 1px; }
    .card-meta .meta-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
    .card-meta .meta-val { font-weight: 600; color: var(--text-2); }
    .card-unavailable { text-align: center; padding: 24px 16px; color: var(--text-3); font-size: 12px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 200; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .modal-overlay.active { display: block; }
    .modal { background: var(--bg-2); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 960px; margin: 32px auto; animation: modalIn 0.3s ease; box-shadow: var(--shadow-lg); overflow: hidden; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }
    .modal-top { padding: 24px 28px 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-2); z-index: 5; border-radius: 20px 20px 0 0; }
    .modal-title-area { display: flex; align-items: center; gap: 16px; }
    .modal-avatar { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #fff; }
    .modal-titles h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .modal-subtitle { font-size: 13px; color: var(--text-3); margin-top: 2px; }
    .modal-price-area { text-align: right; }
    .modal-price { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .modal-price-change { display: inline-flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 600; margin-top: 4px; padding: 3px 12px; border-radius: 20px; }
    .close-x { position: absolute; top: 18px; right: 20px; width: 32px; height: 32px; border-radius: 8px; background: var(--bg-3); border: 1px solid var(--border); color: var(--text-2); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
    .close-x:hover { background: var(--bg-4); color: var(--text); }
    .modal-body { padding: 24px 28px 32px; }

    .metrics-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .metric-box { background: var(--bg-3); border-radius: var(--radius-sm); padding: 14px; }
    .metric-box .m-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; }
    .metric-box .m-value { font-size: 17px; font-weight: 700; margin-top: 5px; letter-spacing: -0.3px; }
    .chart-card { background: var(--bg-3); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .chart-header h3 { font-size: 15px; font-weight: 600; }
    .chart-wrap { height: 260px; position: relative; }

    /* Chart Toggle */
    .chart-tabs { display: flex; background: var(--bg-4); border-radius: var(--radius-xs); overflow: hidden; border: 1px solid var(--border); }
    .chart-tab { padding: 5px 14px; background: none; border: none; color: var(--text-3); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .chart-tab.active { background: var(--blue-dim); color: var(--blue); }
    .chart-tab:hover:not(.active) { color: var(--text-2); }

    /* Pie Chart */
    .pie-verdict { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
    .pie-wrap { width: 180px; height: 180px; flex-shrink: 0; }
    .pie-legend { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 200px; }
    .pie-leg-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .pie-leg-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .pie-leg-label { color: var(--text-2); }
    .pie-leg-val { font-weight: 700; margin-left: auto; }

    /* Analysis Sections */
    .a-section { background: var(--bg-3); border-radius: var(--radius); padding: 22px; margin-bottom: 18px; }
    .a-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .a-num { width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: var(--blue-dim); color: var(--blue); flex-shrink: 0; }
    .a-head h4 { font-size: 14px; font-weight: 600; }

    .fazit-box { padding: 18px 22px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; line-height: 1.6; }
    .verdict-box { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-radius: var(--radius-sm); margin-bottom: 14px; }
    .verdict-text { font-size: 22px; font-weight: 800; }
    .verdict-sub { font-size: 13px; color: var(--text-2); margin-top: 3px; line-height: 1.5; }
    .rec-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .score-bar-wrap { margin-top: 8px; }
    .score-bar { height: 6px; border-radius: 3px; background: var(--bg-4); overflow: hidden; width: 140px; }
    .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

    .reasons { display: flex; flex-direction: column; gap: 6px; }
    .reason { display: flex; align-items: flex-start; gap: 10px; padding: 8px 12px; border-radius: var(--radius-xs); background: rgba(255,255,255,0.02); font-size: 13px; line-height: 1.5; color: var(--text-2); }
    .reason-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .reason-dot.bull { background: var(--green); }
    .reason-dot.bear { background: var(--red); }
    .reason-dot.neut { background: var(--amber); }

    .trend-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .trend-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 12px; }
    .sr-grid { display: flex; gap: 14px; flex-wrap: wrap; }
    .sr-col { flex: 1; min-width: 140px; }
    .sr-col h5 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-3); margin-bottom: 8px; font-weight: 600; }
    .sr-level { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--radius-xs); margin-bottom: 4px; font-size: 13px; font-weight: 600; }
    .sr-level.sup { background: var(--green-dim); color: var(--green); }
    .sr-level.res { background: var(--red-dim); color: var(--red); }
    .sr-dot { width: 6px; height: 6px; border-radius: 50%; }

    .pattern-grid { display: flex; flex-direction: column; gap: 8px; }
    .pat-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border-radius: var(--radius-xs); background: rgba(255,255,255,0.02); }
    .pat-badge { padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; flex-shrink: 0; margin-top: 2px; }
    .pat-badge.bullish { background: var(--green-dim); color: var(--green); }
    .pat-badge.bearish { background: var(--red-dim); color: var(--red); }
    .pat-badge.neutral { background: var(--amber-dim); color: var(--amber); }
    .pat-name { font-size: 14px; font-weight: 600; }
    .pat-desc { font-size: 12px; color: var(--text-3); margin-top: 2px; }

    .ind-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .ind-box { background: var(--bg-4); border-radius: var(--radius-sm); padding: 16px; }
    .ind-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .ind-val { font-size: 20px; font-weight: 700; margin-top: 6px; }
    .ind-status { font-size: 12px; font-weight: 600; margin-top: 4px; }
    .ind-bar { height: 4px; border-radius: 2px; background: var(--bg-2); margin-top: 8px; position: relative; }
    .ind-fill { height: 100%; border-radius: 2px; }
    .ind-marker { position: absolute; top: -4px; width: 3px; height: 12px; border-radius: 2px; background: #fff; }

    .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .setup-item { background: var(--bg-2); border-radius: var(--radius-sm); padding: 16px; text-align: center; border: 1px solid var(--border); }
    .setup-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .setup-val { font-size: 18px; font-weight: 700; margin-top: 6px; }
    .setup-note { font-size: 12px; color: var(--text-2); line-height: 1.5; padding: 10px 14px; background: rgba(255,255,255,0.02); border-radius: var(--radius-xs); }

    .risk-items { display: flex; flex-direction: column; gap: 8px; }
    .risk-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px; border-radius: var(--radius-xs); background: rgba(245,158,11,0.04); font-size: 13px; color: var(--text-2); line-height: 1.5; }
    .risk-icon { flex-shrink: 0; margin-top: 2px; }

    .forecast-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
    .fc-item { background: var(--bg-2); border-radius: var(--radius-sm); padding: 16px; text-align: center; border: 1px solid var(--border); }
    .fc-period { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .fc-target { font-size: 22px; font-weight: 700; margin-top: 6px; letter-spacing: -0.5px; }
    .fc-change { font-size: 13px; font-weight: 600; margin-top: 4px; }
    .forecast-disclaimer { text-align: center; font-size: 11px; color: var(--text-3); margin-top: 16px; padding: 10px; background: rgba(245,158,11,0.05); border-radius: var(--radius-xs); border: 1px solid rgba(245,158,11,0.1); }

    /* Loading */
    .loading-screen { display: none; position: fixed; inset: 0; z-index: 500; background: var(--bg); flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    .loading-screen.active { display: flex; }
    .loader-ring { width: 52px; height: 52px; border-radius: 50%; border: 3px solid var(--bg-3); border-top-color: var(--blue); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 14px; color: var(--text-3); font-weight: 500; }
    .loader-progress { width: 200px; height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
    .loader-bar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); border-radius: 2px; width: 0%; transition: width 0.3s; }
    .error-card { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm); padding: 16px; color: var(--red); text-align: center; font-size: 13px; }

    @media (max-width: 768px) {
      .header { padding: 0 16px; } .page { padding: 20px 16px 60px; }
      .stock-grid { grid-template-columns: 1fr; } .modal { margin: 12px; border-radius: 16px; }
      .modal-body { padding: 16px; } .modal-top { padding: 16px; }
      .modal-titles h2 { font-size: 18px; } .modal-price { font-size: 22px; }
      .metrics-strip { grid-template-columns: repeat(2, 1fr); }
      .forecast-row { grid-template-columns: 1fr 1fr; }
      .sort-bar-right { display: none; }
      .ind-grid { grid-template-columns: 1fr; }
      .setup-grid { grid-template-columns: 1fr 1fr; }
      .pie-verdict { flex-direction: column; align-items: center; }
      .pie-wrap { width: 150px; height: 150px; }
    }
    @media (max-width: 480px) {
      .stat-chip { min-width: 150px; padding: 10px 14px; } .stat-value { font-size: 17px; } .header-title { display: none; }
      .currency-toggle { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loaderText">Lade Aktiendaten...</div>
    <div class="loader-progress"><div class="loader-bar" id="loaderBar"></div></div>
  </div>
  <header class="header">
    <div class="header-left"><div class="logo">A</div><span class="header-title">Aktien Dashboard</span></div>
    <div class="header-right">

// ===== PROXY FETCH =====
async function proxyFetch(url) {
  var cacheBust = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_t=' + Date.now();
  var proxies = [
    function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
    function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); }
  ];
  for (var i = 0; i < proxies.length; i++) {
    try {
      var c = new AbortController();
      var t = setTimeout(function() { c.abort(); }, 7000);
      var r = await fetch(proxies[i](cacheBust), { signal: c.signal });
      clearTimeout(t);
      if (r.ok) return JSON.parse(await r.text());
    } catch(e) { continue; }
  }
  throw new Error('Fetch failed');
}

// Concurrency limiter — max N parallel fetches to avoid proxy throttling
function parallelLimit(tasks, limit) {
  return new Promise(function(resolve) {
    var results = new Array(tasks.length);
    var running = 0, idx = 0, done = 0;
    function next() {
      while (running < limit && idx < tasks.length) {
        (function(i) {
          running++;
          tasks[i]().then(function(v) { results[i] = { status:'fulfilled', value:v }; })
            .catch(function(e) { results[i] = { status:'rejected', reason:e }; })
            .finally(function() { running--; done++; if (done === tasks.length) resolve(results); else next(); });
        })(idx++);
      }
    }
    next();
  });
}

var YF = 'https://query1.finance.yahoo.com';

// ===== EXCHANGE RATE =====
async function fetchExchangeRate() {
  var jobs = [
    proxyFetch(YF + '/v8/finance/chart/EURUSD=X?range=1d&interval=15m&includePrePost=false').catch(function() { return null; }),
    proxyFetch(YF + '/v8/finance/chart/CADUSD=X?range=1d&interval=15m&includePrePost=false').catch(function() { return null; })
  ];
  var res = await Promise.all(jobs);
  var d1 = res[0], d2 = res[1];
  if (d1) { var r = d1.chart && d1.chart.result && d1.chart.result[0]; if (r && r.meta) eurUsdRate = 1 / r.meta.regularMarketPrice; }
  if (d2) { var r2 = d2.chart && d2.chart.result && d2.chart.result[0]; if (r2 && r2.meta) { var cadUsd = r2.meta.regularMarketPrice; if (eurUsdRate) cadEurRate = cadUsd * eurUsdRate; } }
}

async function fetchQuote(symbol) {
  var data = await proxyFetch(YF + '/v8/finance/chart/' + encodeURIComponent(symbol) + '?range=1d&interval=5m&includePrePost=false');
  var r = data && data.chart && data.chart.result && data.chart.result[0]; if (!r) throw new Error('No data');
  var m = r.meta, cl = (r.indicators && r.indicators.quote && r.indicators.quote[0] && r.indicators.quote[0].close) || [];
  var last = cl.filter(function(c) { return c != null; }).pop() || m.regularMarketPrice;
  var price = m.regularMarketPrice || last;
  var prev = m.previousClose || m.chartPreviousClose;
  return {
    symbol: m.symbol || symbol, name: m.shortName || m.longName || symbol,
    price: price, previousClose: prev,
    change: prev ? price - prev : 0,
    changePercent: prev ? ((price - prev) / prev) * 100 : 0,
    dayHigh: m.regularMarketDayHigh, dayLow: m.regularMarketDayLow,
    volume: m.regularMarketVolume, marketCap: m.marketCap, currency: m.currency,
    exchange: m.exchangeName, fiftyTwoWeekHigh: m.fiftyTwoWeekHigh, fiftyTwoWeekLow: m.fiftyTwoWeekLow,
    fiftyDayAverage: m.fiftyDayAverage, twoHundredDayAverage: m.twoHundredDayAverage,
    sparkline: cl.filter(function(c) { return c != null; })
  };
}

async function fetchChart(symbol) {
  var data = await proxyFetch(YF + '/v8/finance/chart/' + encodeURIComponent(symbol) + '?range=6mo&interval=1d&includePrePost=false');
  var r = data && data.chart && data.chart.result && data.chart.result[0]; if (!r) return [];
  var ts = r.timestamp || [], q = (r.indicators && r.indicators.quote && r.indicators.quote[0]) || {};
  return ts.map(function(t, i) {
    return { date: new Date(t * 1000), open: q.open && q.open[i], high: q.high && q.high[i], low: q.low && q.low[i], close: q.close && q.close[i], volume: q.volume && q.volume[i] };
  }).filter(function(d) { return d.close != null; });
}

async function fetchSummary(symbol) {
  try {
    var data = await proxyFetch(YF + '/v10/finance/quoteSummary/' + encodeURIComponent(symbol) + '?modules=financialData,defaultKeyStatistics');
    return (data && data.quoteSummary && data.quoteSummary.result && data.quoteSummary.result[0]) || null;
  } catch(e) { return null; }
}

// ===== LOAD =====
async function loadData() {
  var btn = document.getElementById('refreshBtn');
  var screen = document.getElementById('loadingScreen');
  var bar = document.getElementById('loaderBar');
  var txt = document.getElementById('loaderText');
  btn.disabled = true; screen.classList.add('active');
  bar.style.width = '0%'; txt.textContent = 'Lade Aktiendaten...';
  var loaded = 0; quotesCache = {}; var total = ALL_SYMBOLS.length;
  // Fetch exchange rates in parallel with stocks (not blocking)
  var ratePromise = fetchExchangeRate();
  var tasks = ALL_SYMBOLS.map(function(sym) {
    return function() {
      return fetchQuote(sym).then(function(q) {
        loaded++; bar.style.width = (loaded / total * 100) + '%';
        txt.textContent = loaded + ' von ' + total + ' Aktien geladen...';
        return { symbol: sym, data: q };
      }).catch(function(e) {
        loaded++; bar.style.width = (loaded / total * 100) + '%';
        return { symbol: sym, data: null, error: e.message };
      });
    };
  });
  var results = await parallelLimit(tasks, 6);
  await ratePromise;
  results.forEach(function(r) {
    if (r.status === 'fulfilled') {
      var val = r.value;
      quotesCache[val.symbol] = val.data || { symbol: val.symbol, error: val.error || 'No data' };
    }
  });
  renderTabs(); renderSummary(); renderStocks();
  document.getElementById('updateBadge').style.display = 'flex';
  updateTimeBadge();
  btn.disabled = false; bar.style.width = '100%';
  setTimeout(function() { screen.classList.remove('active'); }, 300);
}

function updateTimeBadge() {

  if (eurUsdRate) text += ' | 1\u20AC = $' + (1/eurUsdRate).toFixed(4);
  document.getElementById('lastUpdate').textContent = text;
}

// Quick refresh (no loading screen, just update prices)
var quickRefreshCount = 0;
async function quickRefresh() {
  try {
    quickRefreshCount++;
    // Only refresh exchange rate every 3rd cycle
    var rateP = (quickRefreshCount % 3 === 0) ? fetchExchangeRate() : Promise.resolve();
    var tasks = ALL_SYMBOLS.map(function(sym) {
      return function() {
        return fetchQuote(sym).then(function(q) { return { symbol: sym, data: q }; })
          .catch(function() { return { symbol: sym, data: null }; });
      };
    });
    var results = await parallelLimit(tasks, 6);
    await rateP;
    results.forEach(function(r) {
      if (r.status === 'fulfilled' && r.value.data) {
        quotesCache[r.value.symbol] = r.value.data;
      }
    });
    renderSummary(); renderStocks();
    updateTimeBadge();
  } catch(e) { /* silent fail on quick refresh */ }
}

// ===== HELPERS =====
function fmt(n) {
  if (n == null) return '\u2013';
  if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'Mrd';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'Mio';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString('de-DE');
}

function convertToEur(val, fromCurrency) {
  if (!val || displayCurrency === 'original') return val;
  if (fromCurrency === 'EUR') return val;
  if (fromCurrency === 'USD' && eurUsdRate) return val * eurUsdRate;
  if (fromCurrency === 'CAD' && cadEurRate) return val * cadEurRate;
  if (fromCurrency === 'CAD' && eurUsdRate) return val * eurUsdRate * 0.72;
  return val;
}

function getDisplaySymbol(origCurrency) {
  if (displayCurrency === 'original') {
    return origCurrency === 'EUR' ? '\u20AC' : origCurrency === 'CAD' ? 'C$' : '$';
  }
  return '\u20AC';
}

function fmtP(n, c) {
  if (n == null) return '\u2013';
  var converted = convertToEur(n, c);
  var sym = getDisplaySymbol(c);
  return sym + converted.toFixed(2);
}

function avatarBg(sym) {
  var hue = 0;
  for (var i = 0; i < sym.length; i++) hue += sym.charCodeAt(i);
  hue = hue % 360;
  return 'linear-gradient(135deg, hsl('+hue+',65%,35%), hsl('+((hue+40)%360)+',60%,28%))';
}
function arrowSvg(up) {
  return up ? '<svg viewBox="0 0 12 12" fill="currentColor"><path d="M6 2l4 5H2z"/></svg>'
    : '<svg viewBox="0 0 12 12" fill="currentColor"><path d="M6 10L2 5h8z"/></svg>';
}

// ===== SPARKLINE =====
function drawSparkline(canvas, data, up) {
  if (!canvas || !data || data.length < 2) return;
  var ctx = canvas.getContext('2d');
  var w = canvas.width = canvas.offsetWidth * 2;
  var h = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  var rw = w / 2, rh = h / 2;
  var min = Math.min.apply(null, data), max = Math.max.apply(null, data);
  var range = max - min || 1;
  var color = up ? '#22c55e' : '#ef4444';
  ctx.beginPath();
  data.forEach(function(v, i) {
    var x = (i / (data.length - 1)) * rw;
    var y = rh - ((v - min) / range) * (rh * 0.85);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.stroke();
  var grad = ctx.createLinearGradient(0, 0, 0, rh);
  grad.addColorStop(0, up ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)');
  grad.addColorStop(1, 'transparent');
  ctx.lineTo(rw, rh); ctx.lineTo(0, rh); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
}

// ===== TECHNICAL INDICATORS =====
function calcEMA(data, period) {
  if (!data || data.length < period) return [];
  var k = 2 / (period + 1);
  var sma = 0; for (var i = 0; i < period; i++) sma += data[i]; sma /= period;
  var ema = [sma];
  for (var j = period; j < data.length; j++) ema.push(data[j] * k + ema[ema.length-1] * (1-k));
  return ema;
}

function calcRSI(closes, period) {
  if (!closes || closes.length < period + 1) return null;
  var gains = [], losses = [];
  for (var i = 1; i < closes.length; i++) {
    var ch = closes[i] - closes[i-1];
    gains.push(ch > 0 ? ch : 0);
    losses.push(ch < 0 ? -ch : 0);
  }
  var avgG = 0, avgL = 0;
  for (var j = 0; j < period; j++) { avgG += gains[j]; avgL += losses[j]; }
  avgG /= period; avgL /= period;
  for (var m = period; m < gains.length; m++) {
    avgG = (avgG * (period-1) + gains[m]) / period;
    avgL = (avgL * (period-1) + losses[m]) / period;
  }
  if (avgL === 0) return 100;
  return 100 - (100 / (1 + avgG / avgL));
}

function calcMACD(closes) {
  if (!closes || closes.length < 35) return null;
  var ema12 = calcEMA(closes, 12);
  var ema26 = calcEMA(closes, 26);
  if (ema26.length === 0) return null;
  var diff = ema12.length - ema26.length;
  var macdLine = [];
  for (var i = 0; i < ema26.length; i++) macdLine.push(ema12[i + diff] - ema26[i]);
  if (macdLine.length < 9) return null;
  var signalLine = calcEMA(macdLine, 9);
  if (signalLine.length === 0) return null;
  var lastM = macdLine[macdLine.length - 1], lastS = signalLine[signalLine.length - 1];
  var prevM = macdLine.length > 1 ? macdLine[macdLine.length - 2] : lastM;
  var prevS = signalLine.length > 1 ? signalLine[signalLine.length - 2] : lastS;
  var cross = 'none';
  if (prevM <= prevS && lastM > lastS) cross = 'bullish';
  else if (prevM >= prevS && lastM < lastS) cross = 'bearish';
  return { line: lastM, signal: lastS, histogram: lastM - lastS, crossover: cross };
}

function detectCandlePatterns(hist) {
  if (!hist || hist.length < 3) return [];
  var pats = [], last = hist.slice(-10);
  for (var i = 1; i < last.length; i++) {
    var c = last[i], p = last[i-1];
    if (!c.open || !c.high || !c.low || !c.close || !p.open || !p.close) continue;
    var body = Math.abs(c.close - c.open), range = c.high - c.low;
    var uShadow = c.high - Math.max(c.open, c.close);
    var lShadow = Math.min(c.open, c.close) - c.low;
    var isGreen = c.close > c.open;
    var pBody = Math.abs(p.close - p.open), pGreen = p.close > p.open;
    if (range > 0 && body / range < 0.1)
      pats.push({ name: 'Doji', type: 'neutral', desc: 'Unentschlossenheit \u2014 Open \u2248 Close. M\u00F6gliches Umkehrsignal am Trend-Ende.' });
    if (body > 0 && lShadow > body * 2 && uShadow < body * 0.5)
      pats.push({ name: 'Hammer', type: 'bullish', desc: 'Langer unterer Schatten zeigt K\u00E4uferst\u00E4rke nach Selloff. Bullishes Umkehrsignal.' });
    if (body > 0 && uShadow > body * 2 && lShadow < body * 0.5)
      pats.push({ name: 'Shooting Star', type: 'bearish', desc: 'Langer oberer Schatten zeigt Verkaufsdruck. Bearishes Umkehrsignal.' });
    if (!pGreen && isGreen && c.open <= p.close && c.close >= p.open && body > pBody)
      pats.push({ name: 'Bullish Engulfing', type: 'bullish', desc: 'Gr\u00FCne Kerze umschlie\u00DFt rote Vorg\u00E4ngerkerze. Starkes Kaufsignal.' });
    if (pGreen && !isGreen && c.open >= p.close && c.close <= p.open && body > pBody)
      pats.push({ name: 'Bearish Engulfing', type: 'bearish', desc: 'Rote Kerze umschlie\u00DFt gr\u00FCne Vorg\u00E4ngerkerze. Starkes Verkaufssignal.' });
    if (range > 0 && body / range < 0.15 && lShadow > range * 0.6 && uShadow > range * 0.6)
      pats.push({ name: 'Spinning Top', type: 'neutral', desc: 'Kleine Kerze mit langen Schatten. Zeigt Unsicherheit im Markt.' });
    if (isGreen && body > range * 0.7 && range > 0)
      pats.push({ name: 'Marubozu (Bullish)', type: 'bullish', desc: 'Starke gr\u00FCne Kerze fast ohne Schatten. Zeigt klaren K\u00E4uferdruck.' });
    if (!isGreen && body > range * 0.7 && range > 0)
      pats.push({ name: 'Marubozu (Bearish)', type: 'bearish', desc: 'Starke rote Kerze fast ohne Schatten. Zeigt klaren Verkaufsdruck.' });
  }
  var seen = {}, unique = [];
  for (var k = pats.length - 1; k >= 0; k--) { if (!seen[pats[k].name]) { seen[pats[k].name] = true; unique.unshift(pats[k]); } }
  return unique.slice(0, 5);
}

function findSupportResistance(hist, price) {
  if (!hist || hist.length < 20 || !price) return { support: [], resistance: [] };
  var highs = hist.map(function(h) { return h.high || h.close; });
  var lows = hist.map(function(h) { return h.low || h.close; });
  var sups = [], ress = [], lb = 5;
  for (var i = lb; i < hist.length - lb; i++) {
    var isMin = true, isMax = true;
    for (var j = 1; j <= lb; j++) {
      if (lows[i] > lows[i-j] || lows[i] > lows[i+j]) isMin = false;
      if (highs[i] < highs[i-j] || highs[i] < highs[i+j]) isMax = false;
    }
    if (isMin) sups.push(lows[i]);
    if (isMax) ress.push(highs[i]);
  }
  function cluster(lvls) {
    if (lvls.length === 0) return [];
    lvls.sort(function(a,b) { return a-b; });
    var cls = [[lvls[0]]];
    for (var m = 1; m < lvls.length; m++) {
      var last = cls[cls.length-1];
      var avg = last.reduce(function(s,v) { return s+v; }, 0) / last.length;
      if (Math.abs(lvls[m] - avg) / avg < 0.025) last.push(lvls[m]);
      else cls.push([lvls[m]]);
    }
    return cls.map(function(c) { return { price: c.reduce(function(s,v) { return s+v; },0)/c.length, strength: c.length }; });
  }
  var sLevels = cluster(sups).filter(function(s) { return s.price < price; }).sort(function(a,b) { return b.price - a.price; }).slice(0, 3);
  var rLevels = cluster(ress).filter(function(r) { return r.price > price; }).sort(function(a,b) { return a.price - b.price; }).slice(0, 3);
  return { support: sLevels, resistance: rLevels };
}

function determineTrend(hist) {
  var def = { direction: 'Seitw\u00E4rtstrend', structure: 'Nicht genug Daten', description: 'Keine ausreichenden Daten f\u00FCr Trendbestimmung.' };
  if (!hist || hist.length < 20) return def;
  var recent = hist.slice(-40);
  var highs = recent.map(function(h) { return h.high || h.close; });
  var lows = recent.map(function(h) { return h.low || h.close; });
  var closes = recent.map(function(h) { return h.close; });
  var swH = [], swL = [];
  for (var i = 3; i < recent.length - 3; i++) {
    var isHi = true, isLo = true;
    for (var j = 1; j <= 3; j++) {
      if (highs[i] < highs[i-j] || highs[i] < highs[i+j]) isHi = false;
      if (lows[i] > lows[i-j] || lows[i] > lows[i+j]) isLo = false;
    }
    if (isHi) swH.push(highs[i]);
    if (isLo) swL.push(lows[i]);
  }
  var hh = false, hl = false, lh = false, ll = false;
  if (swH.length >= 2) { hh = swH[swH.length-1] > swH[swH.length-2]; lh = swH[swH.length-1] < swH[swH.length-2]; }
  if (swL.length >= 2) { hl = swL[swL.length-1] > swL[swL.length-2]; ll = swL[swL.length-1] < swL[swL.length-2]; }
  var dir, struct;
  if (hh && hl) { dir = 'Aufw\u00E4rtstrend'; struct = 'Higher Highs & Higher Lows'; }
  else if (lh && ll) { dir = 'Abw\u00E4rtstrend'; struct = 'Lower Highs & Lower Lows'; }
  else { dir = 'Seitw\u00E4rtstrend'; struct = 'Gemischte Struktur (keine klare Richtung)'; }
  var f5 = closes.slice(0,5).reduce(function(s,v){return s+v;},0)/Math.min(5,closes.length);
  var l5 = closes.slice(-5).reduce(function(s,v){return s+v;},0)/Math.min(5,closes.length);
  var pct = ((l5 - f5) / f5 * 100).toFixed(1);
  return { direction: dir, structure: struct, description: dir + ' \u2014 ' + struct + '. 30-Tage Kurs\u00E4nderung: ' + (pct > 0 ? '+' : '') + pct + '%' };
}

function calcVolatility(hist) {
  if (!hist || hist.length < 14) return { value: 0, level: 'Niedrig' };
  var recent = hist.slice(-20), rets = [];
  for (var i = 1; i < recent.length; i++) { if (recent[i].close && recent[i-1].close) rets.push(Math.log(recent[i].close / recent[i-1].close)); }
  if (rets.length < 5) return { value: 0, level: 'Niedrig' };
  var mean = rets.reduce(function(s,v){return s+v;},0) / rets.length;
  var variance = rets.reduce(function(s,v){return s + (v-mean)*(v-mean);},0) / rets.length;
  var annVol = Math.sqrt(variance) * Math.sqrt(252) * 100;
  var level;
  if (annVol > 60) level = 'Sehr hoch';
  else if (annVol > 40) level = 'Hoch';
  else if (annVol > 20) level = 'Mittel';
  else level = 'Niedrig';
  return { value: annVol, level: level };
}

// ===== COMPREHENSIVE ANALYSIS =====
function buildAnalysis(q, hist, summary) {
  var result = { reasons: [], score: 0 };
  if (!q || !q.price) {
    result.recommendation = 'HALTEN'; result.color = '#f59e0b'; result.colorDim = 'rgba(245,158,11,0.12)';
    result.reasons = [{t:'Keine Daten verf\u00FCgbar',s:'neut'}]; result.fazit = 'Keine Daten verf\u00FCgbar.';
    result.trend = determineTrend(null); result.candlesticks = []; result.indicators = {};
    result.assessment = {verdict:'Neutral',color:'#f59e0b',colorDim:'rgba(245,158,11,0.12)'};
    result.trading = {action:'Hold',actionColor:'#f59e0b'}; result.risk = {volatility:{value:0,level:'?'},warnings:[]};
    result.forecasts = []; return result;
  }
  var price = q.price, closes = hist ? hist.map(function(h){return h.close;}) : [];
  var score = 0, reasons = [];

  result.trend = determineTrend(hist);
  var sr = findSupportResistance(hist, price);
  result.trend.support = sr.support;
  result.trend.resistance = sr.resistance;
  result.candlesticks = detectCandlePatterns(hist);

  var rsi = calcRSI(closes, 14);
  var macd = calcMACD(closes);
  var ema50arr = calcEMA(closes, 50);
  var ema200arr = calcEMA(closes, 200);
  var ema50 = ema50arr.length > 0 ? ema50arr[ema50arr.length-1] : q.fiftyDayAverage;
  var ema200 = ema200arr.length > 0 ? ema200arr[ema200arr.length-1] : q.twoHundredDayAverage;
  var emaSignal = null;
  if (ema50 && ema200) {
    if (price > ema50 && ema50 > ema200) emaSignal = {text:'Kurs > EMA 50 > EMA 200 \u2014 Starker Aufw\u00E4rtstrend best\u00E4tigt',s:'bull'};
    else if (price < ema50 && ema50 < ema200) emaSignal = {text:'Kurs < EMA 50 < EMA 200 \u2014 Starker Abw\u00E4rtstrend best\u00E4tigt',s:'bear'};
    else if (ema50 > ema200) emaSignal = {text:'Golden Cross (EMA 50 > EMA 200) \u2014 Trendwechsel aufsteigend',s:'bull'};
    else emaSignal = {text:'Death Cross (EMA 50 < EMA 200) \u2014 Bearisher Trend',s:'bear'};
  }
  result.indicators = { rsi: rsi, macd: macd, ema50: ema50, ema200: ema200, emaSignal: emaSignal };

  if (result.trend.direction.indexOf('Aufw') >= 0) { score += 15; reasons.push({t:result.trend.description,s:'bull'}); }
  else if (result.trend.direction.indexOf('Abw') >= 0) { score -= 15; reasons.push({t:result.trend.description,s:'bear'}); }
  else { reasons.push({t:result.trend.description,s:'neut'}); }

  if (ema50 && ema200) {
    if (price > ema50 && price > ema200) score += 12;
    else if (price < ema50 && price < ema200) score -= 12;
    if (ema50 > ema200) score += 5; else score -= 5;
    if (emaSignal) reasons.push({t:emaSignal.text,s:emaSignal.s});
  }

  if (rsi != null) {
    if (rsi > 70) { score -= 10; reasons.push({t:'RSI: '+rsi.toFixed(1)+' \u2014 \u00DCberkauft (>70). R\u00FCcksetzer wahrscheinlich.',s:'bear'}); }
    else if (rsi < 30) { score += 10; reasons.push({t:'RSI: '+rsi.toFixed(1)+' \u2014 \u00DCberverkauft (<30). Erholung m\u00F6glich.',s:'bull'}); }
    else if (rsi > 55) { score += 3; reasons.push({t:'RSI: '+rsi.toFixed(1)+' \u2014 Leicht bullish.',s:'bull'}); }
    else if (rsi < 45) { score -= 3; reasons.push({t:'RSI: '+rsi.toFixed(1)+' \u2014 Leicht bearish.',s:'bear'}); }
    else { reasons.push({t:'RSI: '+rsi.toFixed(1)+' \u2014 Neutral.',s:'neut'}); }
  }

  if (macd) {
    if (macd.crossover === 'bullish') { score += 12; reasons.push({t:'MACD: Bullishe Kreuzung \u2014 MACD kreuzt Signallinie nach oben. Kaufsignal.',s:'bull'}); }
    else if (macd.crossover === 'bearish') { score -= 12; reasons.push({t:'MACD: Bearishe Kreuzung \u2014 MACD kreuzt Signallinie nach unten. Verkaufssignal.',s:'bear'}); }
    else if (macd.histogram > 0) { score += 3; reasons.push({t:'MACD Histogramm positiv ('+macd.histogram.toFixed(3)+') \u2014 Bullishes Momentum.',s:'bull'}); }
    else { score -= 3; reasons.push({t:'MACD Histogramm negativ ('+macd.histogram.toFixed(3)+') \u2014 Bearishes Momentum.',s:'bear'}); }
  }

  result.candlesticks.forEach(function(p) {
    if (p.type === 'bullish') score += 5;
    else if (p.type === 'bearish') score -= 5;
  });

  var wH = q.fiftyTwoWeekHigh, wL = q.fiftyTwoWeekLow;
  if (wH && wL && (wH - wL) > 0) {
    var pos52 = (price - wL) / (wH - wL);
    if (pos52 > 0.85) { score -= 8; reasons.push({t:'52-Wochen: Bei '+(pos52*100).toFixed(0)+'% \u2014 Nahe Allzeithoch, \u00FCberkauft.',s:'bear'}); }
    else if (pos52 < 0.15) { score += 8; reasons.push({t:'52-Wochen: Bei '+(pos52*100).toFixed(0)+'% \u2014 Nahe Tief, m\u00F6gliche Kaufgelegenheit.',s:'bull'}); }
    else { reasons.push({t:'52-Wochen: Bei '+(pos52*100).toFixed(0)+'% des Bereichs.',s:'neut'}); }
  }

  var cp = q.changePercent || 0;
  if (cp > 3) { score += 5; reasons.push({t:'Tagesperformance: +'+cp.toFixed(2)+'% \u2014 Starkes Momentum.',s:'bull'}); }
  else if (cp < -3) { score -= 5; reasons.push({t:'Tagesperformance: '+cp.toFixed(2)+'% \u2014 Starker Abverkauf.',s:'bear'}); }

  var targetPrice = null;
  if (summary) {
    var fin = summary.financialData;
    if (fin) {
      var rk = fin.recommendationKey;
      if (rk) {
        if (rk==='buy'||rk==='strong_buy') { score+=10; reasons.push({t:'Analysten: '+rk.replace('_',' ').toUpperCase(),s:'bull'}); }
        else if (rk==='sell'||rk==='strong_sell') { score-=10; reasons.push({t:'Analysten: '+rk.replace('_',' ').toUpperCase(),s:'bear'}); }
        else { reasons.push({t:'Analysten: '+rk.toUpperCase(),s:'neut'}); }
      }
      var tp = (fin.targetMeanPrice && fin.targetMeanPrice.raw != null) ? fin.targetMeanPrice.raw : fin.targetMeanPrice;
      if (tp && typeof tp === 'number') {
        targetPrice = tp;
        var upside = ((tp - price) / price) * 100;
        if (upside > 10) { score+=10; reasons.push({t:'Kursziel: '+tp.toFixed(2)+' (+'+upside.toFixed(1)+'% Potenzial)',s:'bull'}); }
        else if (upside < -10) { score-=10; reasons.push({t:'Kursziel: '+tp.toFixed(2)+' ('+upside.toFixed(1)+'% unter Kurs)',s:'bear'}); }
        else { reasons.push({t:'Kursziel: '+tp.toFixed(2)+' ('+(upside>0?'+':'')+upside.toFixed(1)+'%)',s:'neut'}); }
      }
    }
    var st = summary.defaultKeyStatistics;
    if (st) {
      var pe = (st.forwardPE && st.forwardPE.raw != null) ? st.forwardPE.raw : st.forwardPE;
      if (pe && typeof pe === 'number') {
        if (pe<15) { score+=5; reasons.push({t:'Forward P/E '+pe.toFixed(1)+' \u2014 G\u00FCnstig bewertet.',s:'bull'}); }
        else if (pe>40) { score-=5; reasons.push({t:'Forward P/E '+pe.toFixed(1)+' \u2014 Teuer bewertet.',s:'bear'}); }
        else { reasons.push({t:'Forward P/E: '+pe.toFixed(1)+' \u2014 Fair bewertet.',s:'neut'}); }
      }
    }
  }

  if (hist && hist.length > 30) {
    var rec30 = hist.slice(-30), fv = rec30[0].close, lv = rec30[rec30.length-1].close;
    if (fv && lv) {
      var mc30 = ((lv-fv)/fv)*100;
      if (mc30 > 10) { score+=8; reasons.push({t:'30-Tage: +'+mc30.toFixed(1)+'% \u2014 Starker Aufstieg.',s:'bull'}); }
      else if (mc30 < -10) { score-=8; reasons.push({t:'30-Tage: '+mc30.toFixed(1)+'% \u2014 Starker R\u00FCckgang.',s:'bear'}); }
      else { reasons.push({t:'30-Tage: '+(mc30>0?'+':'')+mc30.toFixed(1)+'%.',s:'neut'}); }
    }
  }

  var verdict, vColor, vDim;
  if (score >= 20) { verdict='Bullish'; vColor='#22c55e'; vDim='rgba(34,197,94,0.12)'; }
  else if (score >= 5) { verdict='Leicht Bullish'; vColor='#86efac'; vDim='rgba(134,239,172,0.1)'; }
  else if (score <= -20) { verdict='Bearish'; vColor='#ef4444'; vDim='rgba(239,68,68,0.12)'; }
  else if (score <= -5) { verdict='Leicht Bearish'; vColor='#fca5a5'; vDim='rgba(252,165,165,0.1)'; }
  else { verdict='Neutral'; vColor='#f59e0b'; vDim='rgba(245,158,11,0.12)'; }
  result.assessment = { verdict: verdict, color: vColor, colorDim: vDim };

  var recStr;
  if (score >= 25) { recStr='KAUFEN'; result.color='#22c55e'; result.colorDim='rgba(34,197,94,0.12)'; }
  else if (score >= 10) { recStr='EHER KAUFEN'; result.color='#86efac'; result.colorDim='rgba(134,239,172,0.1)'; }
  else if (score <= -25) { recStr='VERKAUFEN'; result.color='#ef4444'; result.colorDim='rgba(239,68,68,0.12)'; }
  else if (score <= -10) { recStr='EHER VERKAUFEN'; result.color='#fca5a5'; result.colorDim='rgba(252,165,165,0.1)'; }
  else { recStr='HALTEN'; result.color='#f59e0b'; result.colorDim='rgba(245,158,11,0.12)'; }
  result.recommendation = recStr;
  result.score = score;
  result.reasons = reasons;

  var nearSup = sr.support.length > 0 ? sr.support[0].price : (wL || price * 0.93);
  var nearRes = sr.resistance.length > 0 ? sr.resistance[0].price : (wH || price * 1.1);
  var trading = {};
  if (score >= 10) {
    trading.action = 'Buy'; trading.actionColor = '#22c55e';
    trading.entryLow = nearSup * 1.005; trading.entryHigh = price;
    trading.stopLoss = nearSup * 0.98;
    var risk = price - trading.stopLoss;
    trading.takeProfit = price + Math.max(risk * 2.5, price * 0.03);
    trading.riskReward = risk > 0 ? '1:' + ((trading.takeProfit - price) / risk).toFixed(1) : '\u2013';
    trading.note = 'Einstieg bei aktuellem Kurs oder R\u00FCcksetzer zur Zone '+fmtP(trading.entryLow,q.currency)+' \u2013 '+fmtP(trading.entryHigh,q.currency)+'. Stop-Loss unter Support.';
  } else if (score <= -10) {
    trading.action = 'Sell'; trading.actionColor = '#ef4444';
    trading.entryLow = price; trading.entryHigh = nearRes * 0.995;
    trading.stopLoss = nearRes * 1.02;
    var riskS = trading.stopLoss - price;
    trading.takeProfit = price - Math.max(riskS * 2.5, price * 0.03);
    trading.riskReward = riskS > 0 ? '1:' + ((price - trading.takeProfit) / riskS).toFixed(1) : '\u2013';
    trading.note = 'Verkauf bei aktuellem Kurs. Stop-Loss \u00FCber Resistance bei '+fmtP(trading.stopLoss,q.currency)+'.';
  } else {
    trading.action = 'Hold'; trading.actionColor = '#f59e0b';
    trading.entryLow = nearSup; trading.entryHigh = nearRes;
    trading.stopLoss = nearSup * 0.97; trading.takeProfit = nearRes;
    trading.riskReward = '\u2013';
    trading.note = 'Abwarten. Breakout \u00FCber '+fmtP(nearRes,q.currency)+' oder Bounce von '+fmtP(nearSup,q.currency)+' beobachten bevor gehandelt wird.';
  }
  result.trading = trading;

  var vol = calcVolatility(hist);
  result.risk = { volatility: vol, warnings: [] };
  if (vol.value > 50) result.risk.warnings.push('Sehr hohe Volatilit\u00E4t ('+vol.value.toFixed(0)+'% ann.) \u2014 Erh\u00F6htes Risiko f\u00FCr schnelle Kursschwankungen.');
  if (rsi != null && rsi > 70) result.risk.warnings.push('RSI \u00FCber 70 \u2014 Nicht in Euphorie einsteigen, R\u00FCcksetzer m\u00F6glich.');
  if (rsi != null && rsi < 30) result.risk.warnings.push('RSI unter 30 \u2014 Aktie stark gefallen, m\u00F6gliche Value Trap.');
  if (result.trend.direction.indexOf('Seitw') >= 0) result.risk.warnings.push('Seitw\u00E4rtsmarkt \u2014 Klaren Breakout oder Breakdown abwarten.');
  if (macd && macd.crossover !== 'none') result.risk.warnings.push('K\u00FCrzliche MACD-Kreuzung \u2014 Signal noch nicht best\u00E4tigt, Fehlsignal m\u00F6glich.');
  if (vol.value > 30 && vol.value <= 50) result.risk.warnings.push('Erh\u00F6hte Volatilit\u00E4t \u2014 Positionen entsprechend kleiner halten.');
  if (result.risk.warnings.length === 0) result.risk.warnings.push('Aktuell keine besonderen Risikofaktoren identifiziert.');

  if (score >= 25) {
    result.fazit = 'Klares Kaufsignal. Technische Indikatoren und Trend bullish. Einstieg bei aktuellem Kurs oder R\u00FCcksetzer zur Support-Zone bei '+fmtP(nearSup,q.currency)+'.';
  } else if (score >= 10) {
    result.fazit = 'Leicht bullishes Setup. Idealer Einstieg bei R\u00FCcksetzer zum Support bei '+fmtP(nearSup,q.currency)+' f\u00FCr besseres Risk-Reward. Kein \u00FCbereilter Einstieg.';
  } else if (score <= -25) {
    result.fazit = 'Klares Verkaufssignal. Abw\u00E4rtstrend mit bearishen Indikatoren. Positionen abbauen oder eng absichern.';
  } else if (score <= -10) {
    result.fazit = 'Leicht bearishes Bild. Kein Neueinstieg empfohlen. Bestehende Positionen mit Stop-Loss bei '+fmtP(nearSup,q.currency)+' absichern.';
  } else {
    result.fazit = 'Keine klare Richtung. Breakout \u00FCber '+fmtP(nearRes,q.currency)+' kaufen oder Bounce von '+fmtP(nearSup,q.currency)+' abwarten. Aktuell kein Einstieg.';
  }

  var d = score / 200;
  result.forecasts = [
    {period:'1 Woche', target: price*(1+d*0.25), change: d*25},
    {period:'1 Monat', target: price*(1+d), change: d*100},
    {period:'3 Monate', target: price*(1+d*2.5), change: d*250},
    {period:'6 Monate', target: price*(1+(targetPrice?(targetPrice-price)/price:d*4)), change: targetPrice?((targetPrice-price)/price*100):(d*400)}
  ];

  return result;
}

// ===== CANDLESTICK CHART (Canvas) =====
function drawCandlestickChart(canvasId, hist, currency) {
  var canvas = document.getElementById(canvasId);
  if (!canvas || !hist || hist.length < 5) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  var w = rect.width, h = rect.height;
  var pad = {top: 10, right: 60, bottom: 30, left: 10};
  var cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;

  var data = hist.slice(-60);
  var allPrices = data.reduce(function(a, d) { a.push(d.high || d.close, d.low || d.close); return a; }, []);
  var minP = Math.min.apply(null, allPrices), maxP = Math.max.apply(null, allPrices);
  var range = maxP - minP || 1;
  minP -= range * 0.05; maxP += range * 0.05;
  range = maxP - minP;

  var barW = Math.max(2, (cw / data.length) * 0.7);
  var gap = cw / data.length;

  ctx.fillStyle = '#1a2234'; ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = 'rgba(148,163,184,0.06)'; ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var gy = pad.top + (ch / 4) * g;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(w - pad.right, gy); ctx.stroke();
    var gPrice = maxP - (range / 4) * g;
    var sym = getDisplaySymbol(currency);
    var cv = convertToEur(gPrice, currency);
    ctx.fillStyle = '#64748b'; ctx.font = '11px Inter';
    ctx.textAlign = 'left';
    ctx.fillText(sym + cv.toFixed(2), w - pad.right + 6, gy + 4);
  }

  // Candles
  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    var o = d.open || d.close, hi = d.high || d.close, lo = d.low || d.close, cl = d.close;
    var x = pad.left + gap * i + gap / 2;
    var yO = pad.top + ((maxP - o) / range) * ch;
    var yC = pad.top + ((maxP - cl) / range) * ch;
    var yH = pad.top + ((maxP - hi) / range) * ch;
    var yL = pad.top + ((maxP - lo) / range) * ch;
    var isUp = cl >= o;
    var color = isUp ? '#22c55e' : '#ef4444';

    // Wick
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();

    // Body
    var bodyTop = Math.min(yO, yC), bodyH = Math.max(Math.abs(yC - yO), 1);
    ctx.fillStyle = color;
    ctx.fillRect(x - barW / 2, bodyTop, barW, bodyH);
  }

  // X labels
  ctx.fillStyle = '#64748b'; ctx.font = '10px Inter'; ctx.textAlign = 'center';
  var labelEvery = Math.max(1, Math.floor(data.length / 8));
  for (var j = 0; j < data.length; j += labelEvery) {
    var lbl = data[j].date.toLocaleDateString('de-DE', {day:'2-digit', month:'short'});
    ctx.fillText(lbl, pad.left + gap * j + gap / 2, h - 6);
  }
}

// ===== PIE CHART =====
function renderPieChart(canvasId, analysis) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var score = analysis.score;
  var buyPct, holdPct, sellPct;
  if (score >= 25) { buyPct = 80; holdPct = 15; sellPct = 5; }
  else if (score >= 10) { buyPct = 60; holdPct = 30; sellPct = 10; }
  else if (score >= 0) { buyPct = 30; holdPct = 50; sellPct = 20; }
  else if (score >= -10) { buyPct = 20; holdPct = 50; sellPct = 30; }
  else if (score >= -25) { buyPct = 10; holdPct = 30; sellPct = 60; }
  else { buyPct = 5; holdPct = 15; sellPct = 80; }

  if (pieChart) { pieChart.destroy(); pieChart = null; }
  pieChart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: ['Kaufen', 'Halten', 'Verkaufen'],
      datasets: [{
        data: [buyPct, holdPct, sellPct],
        backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
        borderColor: ['rgba(34,197,94,0.3)', 'rgba(245,158,11,0.3)', 'rgba(239,68,68,0.3)'],
        borderWidth: 2, hoverOffset: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: '60%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(17,24,39,0.95)', titleColor: '#f1f5f9', bodyColor: '#f1f5f9',
          cornerRadius: 8, padding: 10,
          callbacks: { label: function(c) { return c.label + ': ' + c.parsed + '%'; } }
        }
      }
    }
  });
  return { buy: buyPct, hold: holdPct, sell: sellPct };
}

// ===== CHART TOGGLE =====
function switchChartType(type) {
  modalChartType = type;
  document.querySelectorAll('.chart-tab').forEach(function(b) {
    b.classList.toggle('active', b.dataset.type === type);
  });
  var lineWrap = document.getElementById('lineChartWrap');
  var candleWrap = document.getElementById('candleChartWrap');
  if (type === 'line') {
    lineWrap.style.display = 'block';
    candleWrap.style.display = 'none';
  } else {
    lineWrap.style.display = 'none';
    candleWrap.style.display = 'block';
    if (modalHist && modalSymbol) {
      var q = quotesCache[modalSymbol];
      drawCandlestickChart('candleCanvas', modalHist, q ? q.currency : 'USD');
    }
  }
}

// ===== DETAIL VIEW =====
async function openDetail(symbol) {
  var overlay = document.getElementById('modalOverlay');
  var modal = document.getElementById('modalContent');
  overlay.classList.add('active');
  document.body.classList.add('no-scroll');
  overlay.scrollTop = 0;
  modalChartType = 'line';
  modalSymbol = symbol;

  var cs = getDisplaySymbol(q.currency || 'USD');
  var up = (q.changePercent||0)>=0;
  var dispPrice = convertToEur(q.price, q.currency);
  var dispChange = convertToEur(Math.abs(q.change||0), q.currency);
  modal.innerHTML =
    '<div class="modal-top"><div class="modal-title-area">'
    +'<div class="modal-avatar" style="background:'+avatarBg(symbol)+'">'+symbol.slice(0,2)+'</div>'
    +'<div class="modal-titles"><h2>'+(q.name||symbol)+'</h2><div class="modal-subtitle">'+symbol+' \u00B7 '+(q.exchange||'')+' \u00B7 '+(displayCurrency==='EUR'?'EUR':q.currency||'USD')+'</div></div></div>'

    +arrowSvg(up)+' '+(up?'+':'')+(q.changePercent||0).toFixed(2)+'% ('+cs+(dispChange||0).toFixed(2)+')'
    +'</div></div><button class="close-x" onclick="closeModal()">\u2715</button></div>'
    +'<div class="modal-body"><div style="text-align:center;padding:60px"><div class="loader-ring" style="margin:0 auto"></div><p style="margin-top:16px;color:var(--text-3);font-size:13px">Tiefenanalyse wird geladen...</p></div></div>';
  try {
    var res = await Promise.allSettled([fetchChart(symbol), fetchSummary(symbol)]);

  (a.forecasts||[]).forEach(function(f) {
    var fup = f.change >= 0;
    h += '<div class="fc-item"><div class="fc-period">'+f.period+'</div>'
      +'<div class="fc-target" style="color:'+(fup?'#22c55e':'#ef4444')+'">'+fmtP(f.target,q.currency)+'</div>'
      +'<div class="fc-change" style="color:'+(fup?'#22c55e':'#ef4444')+'">'+(fup?'+':'')+f.change.toFixed(1)+'%</div></div>';
  });
  h += '</div><div class="forecast-disclaimer">\u26A0\uFE0F Prognosen basieren auf technischer Analyse und Analystenzielen. Keine Anlageberatung.</div></div>';

  body.innerHTML = h;

  // Render line chart
  if (hist && hist.length > 0) {
    var ctx = document.getElementById('detailChart');
    if (detailChart) { detailChart.destroy(); detailChart = null; }
    var labels = hist.map(function(d) { return d.date.toLocaleDateString('de-DE',{day:'2-digit',month:'short'}); });
    var prices = hist.map(function(d) { return convertToEur(d.close, q.currency); });
    var isUp = prices[prices.length-1] >= prices[0];
    detailChart = new Chart(ctx, {
      type: 'line',
      data: { labels: labels, datasets: [{
        data: prices, borderColor: isUp?'#22c55e':'#ef4444',
        backgroundColor: isUp?'rgba(34,197,94,0.08)':'rgba(239,68,68,0.08)',
        fill: true, tension: 0.35, pointRadius: 0, pointHitRadius: 10, borderWidth: 2
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: { legend: { display: false }, tooltip: {
          backgroundColor: 'rgba(17,24,39,0.95)', borderColor: 'rgba(148,163,184,0.15)', borderWidth: 1,
          titleColor: '#f1f5f9', bodyColor: '#f1f5f9', padding: 12, cornerRadius: 8,
          titleFont: { weight: '600' },
          callbacks: { label: function(c) { return 'Kurs: '+cs+c.parsed.y.toFixed(2); } }
        }},
        scales: {
          x: { grid: { color: 'rgba(148,163,184,0.06)' }, ticks: { color: '#64748b', maxTicksLimit: 8, font: { size: 11 } } },
          y: { grid: { color: 'rgba(148,163,184,0.06)' }, ticks: { color: '#64748b', font: { size: 11 }, callback: function(v) { return cs+v.toFixed(0); } } }
        }
      }
    });
  }

  // Render pie chart
  var pData = renderPieChart('pieChart', a);
  if (pData) {
    var legEl = document.getElementById('pieLegend');
    legEl.innerHTML =
      '<div class="pie-leg-item"><div class="pie-leg-dot" style="background:#22c55e"></div><span class="pie-leg-label">Kaufen</span><span class="pie-leg-val" style="color:#22c55e">'+pData.buy+'%</span></div>'
      +'<div class="pie-leg-item"><div class="pie-leg-dot" style="background:#f59e0b"></div><span class="pie-leg-label">Halten</span><span class="pie-leg-val" style="color:#f59e0b">'+pData.hold+'%</span></div>'
      +'<div class="pie-leg-item"><div class="pie-leg-dot" style="background:#ef4444"></div><span class="pie-leg-label">Verkaufen</span><span class="pie-leg-val" style="color:#ef4444">'+pData.sell+'%</span></div>'
      +'<div style="margin-top:8px;font-size:12px;color:var(--text-3)">Basierend auf Score: '+(a.score>0?'+':'')+a.score+'</div>';
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.classList.remove('no-scroll');
  if (detailChart) { detailChart.destroy(); detailChart = null; }
  if (pieChart) { pieChart.destroy(); pieChart = null; }
  modalHist = null; modalSymbol = null; modalAnalysis = null;
}

document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

// Auto-refresh: quick price update every 15 sec, full reload every 3 min
setInterval(quickRefresh, 15 * 1000);
setInterval(loadData, 3 * 60 * 1000);
loadData();
</script>
</body>
</html>
