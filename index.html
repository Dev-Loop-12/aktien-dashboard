<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktien Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e17;
      --bg-2: #111827;
      --bg-3: #1a2234;
      --bg-4: #222f43;
      --surface: rgba(26,34,52,0.65);
      --glass: rgba(26,34,52,0.45);
      --text: #f1f5f9;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --border: rgba(148,163,184,0.08);
      --border-2: rgba(148,163,184,0.15);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.12);
      --purple: #8b5cf6;
      --purple-dim: rgba(139,92,246,0.12);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.25);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body.no-scroll { overflow: hidden; }

    /* ========== BACKGROUND GLOW ========== */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 15% 10%, rgba(59,130,246,0.07), transparent),
        radial-gradient(ellipse 500px 500px at 85% 80%, rgba(139,92,246,0.06), transparent);
    }

    /* ========== HEADER ========== */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,14,23,0.82);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 38px; height: 38px; border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .update-badge {
      font-size: 11px; color: var(--text-3);
      background: var(--bg-3); padding: 5px 12px; border-radius: 20px;
      display: flex; align-items: center; gap: 6px;
    }
    .update-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .btn {
      padding: 8px 18px; border-radius: var(--radius-xs); border: none;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff; box-shadow: 0 2px 12px rgba(59,130,246,0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59,130,246,0.35); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ========== CONTAINER ========== */
    .page { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 28px 32px 60px; }

    /* ========== SUMMARY STRIP ========== */
    .summary-strip {
      display: flex; gap: 10px; margin-bottom: 28px;
      overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none;
    }
    .summary-strip::-webkit-scrollbar { display: none; }
    .stat-chip {
      flex-shrink: 0;
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 14px 20px; min-width: 170px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.2s;
    }
    .stat-chip:hover { border-color: var(--border-2); }
    .stat-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .stat-info { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 11px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }

    /* ========== CATEGORY TABS ========== */
    .tab-bar {
      display: flex; gap: 6px; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0; overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 10px 20px;
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--text-3); background: none; border: none;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; display: flex; align-items: center; gap: 8px;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text-2); }
    .tab.active { color: var(--text); border-bottom-color: var(--blue); font-weight: 600; }
    .tab .tab-icon { font-size: 15px; }
    .tab .tab-count {
      background: var(--bg-4); font-size: 11px; font-weight: 600;
      padding: 1px 7px; border-radius: 10px; color: var(--text-2);
    }
    .tab.active .tab-count { background: var(--blue-dim); color: var(--blue); }

    /* ========== SORT BAR ========== */
    .sort-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
    }
    .sort-bar-left {
      font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 8px;
    }
    .sort-bar-right { display: flex; gap: 6px; }
    .sort-btn {
      padding: 5px 12px; border-radius: var(--radius-xs);
      background: var(--bg-3); color: var(--text-3); border: 1px solid var(--border);
      font-family: inherit; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .sort-btn:hover, .sort-btn.active { background: var(--blue-dim); color: var(--blue); border-color: rgba(59,130,246,0.2); }
    .view-toggle {
      display: flex; background: var(--bg-3); border-radius: var(--radius-xs);
      overflow: hidden; border: 1px solid var(--border);
    }
    .view-btn {
      padding: 5px 10px; background: none; border: none;
      color: var(--text-3); font-size: 14px; cursor: pointer; transition: all 0.15s;
    }
    .view-btn.active { background: var(--blue-dim); color: var(--blue); }

    /* ========== STOCK GRID ========== */
    .stock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
      animation: fadeIn 0.35s ease;
    }
    .stock-grid.list-view { grid-template-columns: 1fr; }
    .stock-grid.list-view .stock-card { flex-direction: row; align-items: center; padding: 14px 20px; }
    .stock-grid.list-view .stock-card .card-sparkline { width: 100px; height: 32px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .stock-card {
      background: var(--surface); backdrop-filter: blur(10px);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column; gap: 14px;
      position: relative; overflow: hidden;
    }
    .stock-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(59,130,246,0.03));
      opacity: 0; transition: opacity 0.3s;
    }
    .stock-card:hover {
      border-color: var(--border-2);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }
    .stock-card:hover::before { opacity: 1; }

    .card-row-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-symbol-group { display: flex; align-items: center; gap: 12px; }
    .card-avatar {
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; letter-spacing: -0.5px;
      color: var(--text);
    }
    .card-symbol { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .card-name {
      font-size: 12px; color: var(--text-3); margin-top: 1px;
      max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .card-price-group { text-align: right; }
    .card-price { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .card-change {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 13px; font-weight: 600; margin-top: 4px;
    }
    .card-change.up { background: var(--green-dim); color: var(--green); }
    .card-change.down { background: var(--red-dim); color: var(--red); }
    .card-change svg { width: 12px; height: 12px; }

    .card-row-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
    .card-sparkline { width: 100%; height: 40px; flex: 1; }
    .card-meta {
      display: flex; gap: 16px; font-size: 11px; color: var(--text-3);
      flex-shrink: 0; padding-left: 14px;
    }
    .card-meta span { display: flex; flex-direction: column; gap: 1px; }
    .card-meta .meta-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
    .card-meta .meta-val { font-weight: 600; color: var(--text-2); }

    .card-unavailable {
      text-align: center; padding: 24px 16px; color: var(--text-3); font-size: 12px;
    }

    /* ========== MODAL ========== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      z-index: 200; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal-overlay.active { display: block; }

    .modal {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 920px;
      margin: 32px auto; animation: modalIn 0.3s ease;
      box-shadow: var(--shadow-lg); overflow: hidden;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }

    .modal-top {
      padding: 24px 28px 20px;
      display: flex; justify-content: space-between; align-items: flex-start;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg-2);
      z-index: 5; border-radius: 20px 20px 0 0;
    }
    .modal-title-area { display: flex; align-items: center; gap: 16px; }
    .modal-avatar {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
    }
    .modal-titles h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .modal-subtitle { font-size: 13px; color: var(--text-3); margin-top: 2px; }
    .modal-price-area { text-align: right; }
    .modal-price { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .modal-price-change {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 14px; font-weight: 600; margin-top: 4px;
      padding: 3px 12px; border-radius: 20px;
    }
    .close-x {
      position: absolute; top: 18px; right: 20px;
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--bg-3); border: 1px solid var(--border);
      color: var(--text-2); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .close-x:hover { background: var(--bg-4); color: var(--text); }

    .modal-body { padding: 24px 28px 32px; }

    /* Key metrics strip */
    .metrics-strip {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px; margin-bottom: 24px;
    }
    .metric-box {
      background: var(--bg-3); border-radius: var(--radius-sm); padding: 14px;
    }
    .metric-box .m-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; }
    .metric-box .m-value { font-size: 17px; font-weight: 700; margin-top: 5px; letter-spacing: -0.3px; }

    /* Chart */
    .chart-card {
      background: var(--bg-3); border-radius: var(--radius); padding: 20px;
      margin-bottom: 24px;
    }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .chart-header h3 { font-size: 15px; font-weight: 600; }
    .chart-wrap { height: 260px; position: relative; }

    /* Analysis */
    .analysis-card {
      background: var(--bg-3); border-radius: var(--radius); padding: 24px;
      margin-bottom: 24px;
    }
    .analysis-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
    .rec-banner {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-radius: var(--radius-sm);
      margin-bottom: 20px;
    }
    .rec-icon { font-size: 32px; }
    .rec-text { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
    .rec-score { font-size: 13px; font-weight: 500; opacity: 0.7; margin-top: 2px; }
    .score-bar {
      height: 6px; border-radius: 3px; background: var(--bg-4);
      margin-top: 6px; overflow: hidden; width: 120px;
    }
    .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

    .reasons { display: flex; flex-direction: column; gap: 8px; }
    .reason {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius-xs);
      background: rgba(255,255,255,0.02); font-size: 13px; line-height: 1.55;
      color: var(--text-2);
    }
    .reason-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; margin-top: 5px;
    }
    .reason-dot.bull { background: var(--green); }
    .reason-dot.bear { background: var(--red); }
    .reason-dot.neut { background: var(--amber); }

    /* Forecast */
    .forecast-card {
      background: var(--bg-3); border-radius: var(--radius); padding: 24px;
    }
    .forecast-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
    .forecast-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    .fc-item {
      background: var(--bg-2); border-radius: var(--radius-sm);
      padding: 16px; text-align: center;
      border: 1px solid var(--border);
    }
    .fc-period { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .fc-target { font-size: 22px; font-weight: 700; margin-top: 6px; letter-spacing: -0.5px; }
    .fc-change { font-size: 13px; font-weight: 600; margin-top: 4px; }
    .forecast-disclaimer {
      text-align: center; font-size: 11px; color: var(--text-3);
      margin-top: 16px; padding: 10px; background: rgba(245,158,11,0.05);
      border-radius: var(--radius-xs); border: 1px solid rgba(245,158,11,0.1);
    }

    /* ========== LOADING ========== */
    .loading-screen {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: var(--bg); flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    .loading-screen.active { display: flex; }
    .loader-ring {
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid var(--bg-3); border-top-color: var(--blue);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 14px; color: var(--text-3); font-weight: 500; }
    .loader-progress {
      width: 200px; height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden;
    }
    .loader-bar {
      height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple));
      border-radius: 2px; width: 0%; transition: width 0.3s;
    }

    .error-card {
      background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-sm); padding: 16px;
      color: var(--red); text-align: center; font-size: 13px;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .header { padding: 0 16px; }
      .page { padding: 20px 16px 60px; }
      .stock-grid { grid-template-columns: 1fr; }
      .modal { margin: 12px; border-radius: 16px; }
      .modal-body { padding: 16px; }
      .modal-top { padding: 16px; }
      .modal-titles h2 { font-size: 18px; }
      .modal-price { font-size: 22px; }
      .metrics-strip { grid-template-columns: repeat(2, 1fr); }
      .forecast-row { grid-template-columns: 1fr 1fr; }
      .sort-bar-right { display: none; }
    }
    @media (max-width: 480px) {
      .stat-chip { min-width: 150px; padding: 10px 14px; }
      .stat-value { font-size: 17px; }
      .header-title { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="loading-screen" id="loadingScreen">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loaderText">Lade Aktiendaten...</div>
    <div class="loader-progress"><div class="loader-bar" id="loaderBar"></div></div>
  </div>

  <header class="header">
    <div class="header-left">
      <div class="logo">A</div>
      <span class="header-title">Aktien Dashboard</span>
    </div>
    <div class="header-right">
      <div class="update-badge" id="updateBadge" style="display:none">
        <div class="update-dot"></div>
        <span id="lastUpdate"></span>
      </div>
      <button class="btn btn-primary" id="refreshBtn" onclick="loadData()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Aktualisieren
      </button>
    </div>
  </header>

  <div class="page">
    <div class="summary-strip" id="summaryStrip"></div>
    <div class="tab-bar" id="tabBar"></div>
    <div class="sort-bar">
      <div class="sort-bar-left" id="sortInfo"></div>
      <div class="sort-bar-right">
        <button class="sort-btn active" data-sort="name" onclick="setSort('name')">Name</button>
        <button class="sort-btn" data-sort="change" onclick="setSort('change')">% &Auml;nderung</button>
        <button class="sort-btn" data-sort="price" onclick="setSort('price')">Preis</button>
        <div class="view-toggle">
          <button class="view-btn active" data-view="grid" onclick="setView('grid')" title="Kacheln">&#9638;</button>
          <button class="view-btn" data-view="list" onclick="setView('list')" title="Liste">&#9776;</button>
        </div>
      </div>
    </div>
    <div class="stock-grid" id="stockGrid"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

<script>
// ===== CONFIG =====
const STOCK_CATEGORIES = {
  "Energieunternehmen (Strom)": { icon: "\u26A1", color: "#f59e0b", stocks: [
    { symbol: "EQT", industry: "Oil & Gas", currency: "USD" },
    { symbol: "BE", industry: "Machinery, Equipment & Components", currency: "USD" },
    { symbol: "SEI", industry: "Oil & Gas Related Equipment and Services", currency: "USD" },
    { symbol: "LBRT", industry: "Oil & Gas Related Equipment and Services", currency: "USD" },
    { symbol: "PSIX", industry: "Machinery, Equipment & Components", currency: "USD" }
  ]},
  "Bitcoin Mining": { icon: "\u20BF", color: "#f97316", stocks: [
    { symbol: "CORZ", industry: "Fintech & Infrastructure", currency: "USD" },
    { symbol: "IREN", industry: "Fintech & Infrastructure", currency: "USD" },
    { symbol: "CIFR", industry: "Fintech & Infrastructure", currency: "USD" },
    { symbol: "RIOT", industry: "Fintech & Infrastructure", currency: "USD" },
    { symbol: "BTDR", industry: "Fintech & Infrastructure", currency: "USD" },
    { symbol: "HUT", industry: "Fintech & Infrastructure", currency: "USD" },
    { symbol: "CLSK", industry: "Fintech & Infrastructure", currency: "USD" },
    { symbol: "BITF", industry: "Fintech & Infrastructure", currency: "CAD" },
    { symbol: "KRC", industry: "Residential & Commercial REIT", currency: "USD" },
    { symbol: "WYFI", industry: "Software & IT Services", currency: "USD" },
    { symbol: "D4T.DE", industry: "Software & IT Services", currency: "EUR" }
  ]},
  "GPU & Hosting": { icon: "\uD83D\uDDA5\uFE0F", color: "#84cc16", stocks: [
    { symbol: "CRWV", industry: "Software & IT Services", currency: "USD" },
    { symbol: "APLD", industry: "Fintech & Infrastructure", currency: "USD" }
  ]},
  "Data Centre & Big Tech": { icon: "\uD83C\uDF10", color: "#3b82f6", stocks: [

// ===== PROXY FETCH =====
async function proxyFetch(url) {
  const proxies = [
    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    u => 'https://corsproxy.io/?' + encodeURIComponent(u)
  ];
  for (const p of proxies) {
    try {
      const c = new AbortController();
      const t = setTimeout(() => c.abort(), 12000);
      const r = await fetch(p(url), { signal: c.signal });
      clearTimeout(t);
      if (r.ok) return JSON.parse(await r.text());
    } catch { continue; }
  }
  throw new Error('Fetch failed');
}

const YF = 'https://query1.finance.yahoo.com';

async function fetchQuote(symbol) {
  const data = await proxyFetch(YF + '/v8/finance/chart/' + encodeURIComponent(symbol) + '?range=5d&interval=1d&includePrePost=false');
  const r = data && data.chart && data.chart.result && data.chart.result[0]; if (!r) throw new Error('No data');
  const m = r.meta, cl = (r.indicators && r.indicators.quote && r.indicators.quote[0] && r.indicators.quote[0].close) || [];
  const last = cl.filter(c => c != null).pop() || m.regularMarketPrice;
  const prev = m.chartPreviousClose || m.previousClose;
  const intra = (r.indicators && r.indicators.quote && r.indicators.quote[0] && r.indicators.quote[0].close) || [];
  return {
    symbol: m.symbol || symbol, name: m.shortName || m.longName || symbol,
    price: m.regularMarketPrice || last, previousClose: prev,
    change: last - prev, changePercent: prev ? ((last - prev) / prev) * 100 : 0,
    dayHigh: m.regularMarketDayHigh, dayLow: m.regularMarketDayLow,
    volume: m.regularMarketVolume, marketCap: m.marketCap, currency: m.currency,
    exchange: m.exchangeName, fiftyTwoWeekHigh: m.fiftyTwoWeekHigh, fiftyTwoWeekLow: m.fiftyTwoWeekLow,
    fiftyDayAverage: m.fiftyDayAverage, twoHundredDayAverage: m.twoHundredDayAverage,
    sparkline: intra.filter(c => c != null)
  };
}

async function fetchChart(symbol) {
  const data = await proxyFetch(YF + '/v8/finance/chart/' + encodeURIComponent(symbol) + '?range=6mo&interval=1d&includePrePost=false');
  const r = data && data.chart && data.chart.result && data.chart.result[0]; if (!r) return [];
  const ts = r.timestamp || [], q = (r.indicators && r.indicators.quote && r.indicators.quote[0]) || {};
  return ts.map(function(t, i) { return { date: new Date(t * 1000), close: q.close && q.close[i], volume: q.volume && q.volume[i] }; }).filter(function(d) { return d.close != null; });
}

async function fetchSummary(symbol) {
  try {
    const data = await proxyFetch(YF + '/v10/finance/quoteSummary/' + encodeURIComponent(symbol) + '?modules=financialData,defaultKeyStatistics');
    return (data && data.quoteSummary && data.quoteSummary.result && data.quoteSummary.result[0]) || null;
  } catch { return null; }
}

// ===== LOAD =====
async function loadData() {
  var btn = document.getElementById('refreshBtn');
  var screen = document.getElementById('loadingScreen');
  var bar = document.getElementById('loaderBar');
  var txt = document.getElementById('loaderText');
  btn.disabled = true; screen.classList.add('active');
  bar.style.width = '0%'; txt.textContent = 'Lade Aktiendaten...';

  var loaded = 0;
  quotesCache = {};
  var total = ALL_SYMBOLS.length;

  var results = await Promise.allSettled(ALL_SYMBOLS.map(async function(sym) {
    try {
      var q = await fetchQuote(sym);
      loaded++;
      bar.style.width = (loaded / total * 100) + '%';
      txt.textContent = loaded + ' von ' + total + ' Aktien geladen...';
      return { symbol: sym, data: q };
    } catch (e) { loaded++; bar.style.width = (loaded / total * 100) + '%'; return { symbol: sym, data: null, error: e.message }; }
  }));

  results.forEach(function(r) {
    if (r.status === 'fulfilled') {
      var val = r.value;
      quotesCache[val.symbol] = val.data || { symbol: val.symbol, error: val.error || 'No data' };
    }
  });

  renderTabs();
  renderSummary();
  renderStocks();
  document.getElementById('updateBadge').style.display = 'flex';
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('de-DE');
  btn.disabled = false;
  bar.style.width = '100%';
  setTimeout(function() { screen.classList.remove('active'); }, 300);
}

// ===== HELPERS =====
function fmt(n) {
  if (n == null) return '\u2013';
  if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'Mrd';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'Mio';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString('de-DE');
}
function fmtP(n, c) {
  if (n == null) return '\u2013';
  var s = c==='EUR'?'\u20AC':c==='CAD'?'C$':'$';
  return s + n.toFixed(2);
}
function avatarBg(sym) {
  var hue = 0;
  for (var i = 0; i < sym.length; i++) hue += sym.charCodeAt(i);
  hue = hue % 360;
  return 'linear-gradient(135deg, hsl('+hue+',65%,35%), hsl('+((hue+40)%360)+',60%,28%))';
}
function arrowSvg(up) {
  return up
    ? '<svg viewBox="0 0 12 12" fill="currentColor"><path d="M6 2l4 5H2z"/></svg>'
    : '<svg viewBox="0 0 12 12" fill="currentColor"><path d="M6 10L2 5h8z"/></svg>';
}

// ===== SPARKLINE =====
function drawSparkline(canvas, data, up) {
  if (!canvas || !data || data.length < 2) return;
  var ctx = canvas.getContext('2d');
  var w = canvas.width = canvas.offsetWidth * 2;
  var h = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  var rw = w / 2, rh = h / 2;
  var min = Math.min.apply(null, data), max = Math.max.apply(null, data);
  var range = max - min || 1;
  var color = up ? '#22c55e' : '#ef4444';
  ctx.beginPath();
  data.forEach(function(v, i) {
    var x = (i / (data.length - 1)) * rw;
    var y = rh - ((v - min) / range) * (rh * 0.85);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.stroke();
  var grad = ctx.createLinearGradient(0, 0, 0, rh);
  grad.addColorStop(0, up ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)');
  grad.addColorStop(1, 'transparent');
  ctx.lineTo(rw, rh); ctx.lineTo(0, rh); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();
}

// ===== ANALYSIS =====
function buildAnalysis(q, hist, summary) {
  if (!q || !q.price) return { recommendation:'HALTEN', color:'var(--amber)', score:0, reasons:[{t:'Keine Daten verf\u00FCgbar',s:'neut'}] };
  var reasons = []; var score = 0;
  var price = q.price, f50 = q.fiftyDayAverage, f200 = q.twoHundredDayAverage;

  if (f50 && f200) {
    if (price > f50 && price > f200) { score += 20; reasons.push({ t: 'Kurs ('+price.toFixed(2)+') \u00FCber 50-Tage ('+f50.toFixed(2)+') & 200-Tage Durchschnitt ('+f200.toFixed(2)+') \u2014 Bullish', s: 'bull' }); }
    else if (price < f50 && price < f200) { score -= 20; reasons.push({ t: 'Kurs ('+price.toFixed(2)+') unter 50-Tage ('+f50.toFixed(2)+') & 200-Tage Durchschnitt ('+f200.toFixed(2)+') \u2014 Bearish', s: 'bear' }); }
    else { reasons.push({ t: 'Kurs zwischen den gleitenden Durchschnitten \u2014 Neutral', s: 'neut' }); }
    if (f50 > f200) { score += 10; reasons.push({ t: '50-Tage \u00FCber 200-Tage Durchschnitt \u2014 Golden Cross', s: 'bull' }); }
    else { score -= 10; reasons.push({ t: '50-Tage unter 200-Tage Durchschnitt \u2014 Death Cross', s: 'bear' }); }
  }

  var wH = q.fiftyTwoWeekHigh, wL = q.fiftyTwoWeekLow;
  if (wH && wL) {
    var rng = wH - wL, pos = rng > 0 ? (price - wL) / rng : 0.5;
    if (pos > 0.8) { score -= 10; reasons.push({ t: 'Nahe am 52-Wochen-Hoch ('+(pos*100).toFixed(0)+'%) \u2014 M\u00F6glicherweise \u00FCberkauft', s: 'bear' }); }
    else if (pos < 0.2) { score += 10; reasons.push({ t: 'Nahe am 52-Wochen-Tief ('+(pos*100).toFixed(0)+'%) \u2014 M\u00F6gliche Kaufgelegenheit', s: 'bull' }); }
    else { reasons.push({ t: 'Bei '+(pos*100).toFixed(0)+'% des 52-Wochen-Bereichs', s: 'neut' }); }
  }

  var cp = q.changePercent;
  if (cp > 3) { score += 10; reasons.push({ t: 'Starker Tagesanstieg +'+cp.toFixed(2)+'% \u2014 Positives Momentum', s: 'bull' }); }
  else if (cp < -3) { score -= 10; reasons.push({ t: 'Starker Tagesr\u00FCckgang '+cp.toFixed(2)+'% \u2014 Negatives Momentum', s: 'bear' }); }

  if (summary) {
    var fin = summary.financialData;
    if (fin) {
      var rk = fin.recommendationKey;
      if (rk) {
        if (rk==='buy'||rk==='strong_buy') { score+=15; reasons.push({ t:'Analysten: '+rk.replace('_',' ').toUpperCase(), s:'bull' }); }
        else if (rk==='sell'||rk==='strong_sell') { score-=15; reasons.push({ t:'Analysten: '+rk.replace('_',' ').toUpperCase(), s:'bear' }); }
        else { reasons.push({ t:'Analysten: '+rk.toUpperCase(), s:'neut' }); }
      }
      var tp = (fin.targetMeanPrice && fin.targetMeanPrice.raw != null) ? fin.targetMeanPrice.raw : fin.targetMeanPrice;
      if (tp && typeof tp === 'number') {
        var up2 = ((tp-price)/price)*100;
        if (up2>10) { score+=15; reasons.push({t:'Kursziel: '+tp.toFixed(2)+' ('+up2.toFixed(1)+'% Potenzial)',s:'bull'}); }
        else if (up2<-10) { score-=15; reasons.push({t:'Kursziel: '+tp.toFixed(2)+' ('+Math.abs(up2).toFixed(1)+'% unter Kurs)',s:'bear'}); }
        else { reasons.push({t:'Kursziel: '+tp.toFixed(2)+' ('+(up2>0?'+':'')+up2.toFixed(1)+'%)',s:'neut'}); }
      }
    }
    var st = summary.defaultKeyStatistics;
    if (st) {
      var pe = (st.forwardPE && st.forwardPE.raw != null) ? st.forwardPE.raw : st.forwardPE;
      if (pe && typeof pe === 'number') {
        if (pe<15) { score+=5; reasons.push({t:'Forward P/E '+pe.toFixed(1)+' \u2014 G\u00FCnstig',s:'bull'}); }
        else if (pe>40) { score-=5; reasons.push({t:'Forward P/E '+pe.toFixed(1)+' \u2014 Teuer',s:'bear'}); }
        else { reasons.push({t:'Forward P/E: '+pe.toFixed(1),s:'neut'}); }
      }
    }
  }

  if (hist && hist.length > 30) {
    var rec = hist.slice(-30), fv = rec[0] && rec[0].close, lv = rec[rec.length-1] && rec[rec.length-1].close;
    if (fv && lv) { var mc = ((lv-fv)/fv)*100;
      if (mc>10) { score+=10; reasons.push({t:'30-Tage: +'+mc.toFixed(1)+'% \u2014 Starker Aufw\u00E4rtstrend',s:'bull'}); }
      else if (mc<-10) { score-=10; reasons.push({t:'30-Tage: '+mc.toFixed(1)+'% \u2014 Starker Abw\u00E4rtstrend',s:'bear'}); }
      else { reasons.push({t:'30-Tage: '+(mc>0?'+':'')+mc.toFixed(1)+'%',s:'neut'}); }
    }
  }

  var recStr, color;
  if (score>=25) { recStr='KAUFEN'; color='var(--green)'; }
  else if (score>=10) { recStr='EHER KAUFEN'; color='#86efac'; }
  else if (score<=-25) { recStr='VERKAUFEN'; color='var(--red)'; }
  else if (score<=-10) { recStr='EHER VERKAUFEN'; color='#fca5a5'; }
  else { recStr='HALTEN'; color='var(--amber)'; }
  return { recommendation: recStr, color: color, score: score, reasons: reasons };
}

function buildForecast(price, score, q) {
  if (!price) return [];
  var d = score/200;
  var tp = q && q.targetMeanPrice;
  var factors = [
    { period:'1 Woche', factor: d*0.25 },
    { period:'1 Monat', factor: d },
    { period:'3 Monate', factor: d*2.5 },
    { period:'6 Monate', factor: tp ? (tp-price)/price : d*4 }
  ];
  return factors.map(function(f) { return { period: f.period, target: price*(1+f.factor), change: f.factor*100 }; });
}

    + '</div>'

    renderModal(symbol, q, hist, analysis);
  } catch (e) {
    modal.querySelector('.modal-body').innerHTML = '<div class="error-card">Fehler beim Laden der Analyse.</div>';
  }
}

function renderModal(symbol, q, hist, analysis) {
  var modal = document.getElementById('modalContent');
  var cs = (q.currency||'USD')==='EUR'?'\u20AC':(q.currency||'USD')==='CAD'?'C$':'$';
  var up = (q.changePercent||0)>=0;
  var forecasts = buildForecast(q.price, analysis.score, q);

  var recIcon = analysis.recommendation.indexOf('KAUFEN')>=0?'\u2197':analysis.recommendation.indexOf('VERKAUFEN')>=0?'\u2198':'\u2192';
  var scoreNorm = Math.min(100, Math.max(0, (analysis.score + 60) / 1.2));

  var body = modal.querySelector('.modal-body');
  body.innerHTML =
    '<div class="metrics-strip">'
    + '<div class="metric-box"><div class="m-label">Vortag</div><div class="m-value">'+fmtP(q.previousClose,q.currency)+'</div></div>'
    + '<div class="metric-box"><div class="m-label">Tageshoch</div><div class="m-value">'+fmtP(q.dayHigh,q.currency)+'</div></div>'
    + '<div class="metric-box"><div class="m-label">Tagestief</div><div class="m-value">'+fmtP(q.dayLow,q.currency)+'</div></div>'
    + '<div class="metric-box"><div class="m-label">52W Hoch</div><div class="m-value">'+fmtP(q.fiftyTwoWeekHigh,q.currency)+'</div></div>'
    + '<div class="metric-box"><div class="m-label">52W Tief</div><div class="m-value">'+fmtP(q.fiftyTwoWeekLow,q.currency)+'</div></div>'
    + '<div class="metric-box"><div class="m-label">MCap</div><div class="m-value">'+fmt(q.marketCap)+'</div></div>'
    + '<div class="metric-box"><div class="m-label">Volumen</div><div class="m-value">'+fmt(q.volume)+'</div></div>'
    + '<div class="metric-box"><div class="m-label">50T \u00D8</div><div class="m-value">'+fmtP(q.fiftyDayAverage,q.currency)+'</div></div>'
    + '</div>'

    + '<div class="chart-card">'
    + '<div class="chart-header"><h3>Kursverlauf</h3></div>'
    + '<div class="chart-wrap"><canvas id="detailChart"></canvas></div>'
    + '</div>'

    + '<div class="analysis-card">'
    + '<h3>Analyse & Empfehlung</h3>'
    + '<div class="rec-banner" style="background:'+analysis.color+'15;border:1px solid '+analysis.color+'30;">'
    + '<div style="display:flex;flex-direction:column;align-items:center;min-width:60px">'
    + '<div class="rec-icon" style="color:'+analysis.color+'">'+recIcon+'</div>'
    + '</div>'
    + '<div>'
    + '<div class="rec-text" style="color:'+analysis.color+'">'+analysis.recommendation+'</div>'
    + '<div class="rec-score">Analyse-Score: '+(analysis.score > 0 ? '+' : '')+analysis.score+'</div>'
    + '<div class="score-bar"><div class="score-fill" style="width:'+scoreNorm+'%;background:'+analysis.color+'"></div></div>'
    + '</div></div>'
    + '<div class="reasons">'
    + analysis.reasons.map(function(r) { return '<div class="reason"><div class="reason-dot '+r.s+'"></div><span>'+r.t+'</span></div>'; }).join('')
    + '</div></div>'

    + '<div class="forecast-card">'
    + '<h3>Zukunftsprognose</h3>'
    + '<div class="forecast-row">'
    + forecasts.map(function(f) {
        var fup = f.change >= 0;
        return '<div class="fc-item">'
          + '<div class="fc-period">'+f.period+'</div>'
          + '<div class="fc-target" style="color:'+(fup?'var(--green)':'var(--red)')+'">'+cs+f.target.toFixed(2)+'</div>'
          + '<div class="fc-change" style="color:'+(fup?'var(--green)':'var(--red)')+'">'+(fup?'+':'')+f.change.toFixed(1)+'%</div>'
          + '</div>';
      }).join('')
    + '</div>'
    + '<div class="forecast-disclaimer">\u26A0\uFE0F Prognosen basieren auf technischer Analyse und Analystenzielen. Keine Anlageberatung.</div>'
    + '</div>';

  if (hist.length > 0) {
    var ctx = document.getElementById('detailChart');
    if (detailChart) { detailChart.destroy(); detailChart = null; }
    var labels = hist.map(function(h) { return h.date.toLocaleDateString('de-DE',{day:'2-digit',month:'short'}); });
    var prices = hist.map(function(h) { return h.close; });
    var isUp = prices[prices.length-1] >= prices[0];
    detailChart = new Chart(ctx, {
      type: 'line',
      data: { labels: labels, datasets: [{
        data: prices, borderColor: isUp?'#22c55e':'#ef4444',
        backgroundColor: isUp?'rgba(34,197,94,0.08)':'rgba(239,68,68,0.08)',
        fill: true, tension: 0.35, pointRadius: 0, pointHitRadius: 10, borderWidth: 2
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: { legend: { display: false }, tooltip: {
          backgroundColor: 'rgba(17,24,39,0.95)', borderColor: 'rgba(148,163,184,0.15)', borderWidth: 1,
          titleColor: '#f1f5f9', bodyColor: '#f1f5f9', padding: 12, cornerRadius: 8,
          titleFont: { weight: '600' },
          callbacks: { label: function(c) { return 'Kurs: '+cs+c.parsed.y.toFixed(2); } }
        }},
        scales: {
          x: { grid: { color: 'rgba(148,163,184,0.06)' }, ticks: { color: '#64748b', maxTicksLimit: 8, font: { size: 11 } } },
          y: { grid: { color: 'rgba(148,163,184,0.06)' }, ticks: { color: '#64748b', font: { size: 11 }, callback: function(v) { return cs + v.toFixed(0); } } }
        }
      }
    });
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.classList.remove('no-scroll');
  if (detailChart) { detailChart.destroy(); detailChart = null; }
}

document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

setInterval(loadData, 5 * 60 * 1000);
loadData();
</script>
</body>
</html>
